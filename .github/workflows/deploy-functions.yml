name: Deploy Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Staging: push to `staging` branch → deploys to staging Supabase project (deploy-staging.yml)
# Production: push to `main` branch → deploys to production Supabase project (this file)
# Required secrets for staging: STAGING_SUPABASE_PROJECT_REF, STAGING_SUPABASE_DB_PASSWORD
# Required secrets for both: SUPABASE_ACCESS_TOKEN

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Type check
        run: npx tsc --noEmit

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [test]
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        run: npx supabase@latest --version

      - name: Link project
        run: npx supabase@latest link --project-ref $SUPABASE_PROJECT_REF

      - name: Push schema migrations
        run: npx supabase@latest db push

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [test]
    # Independent of migrate — edge functions should ship even when a DB
    # migration fails, so a broken migration doesn't block unrelated code.
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        run: npx supabase@latest --version

      - name: Deploy all edge functions
        run: npx supabase@latest functions deploy --project-ref $SUPABASE_PROJECT_REF

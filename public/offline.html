<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f59e0b" />
    <title>Klovers — Offline</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #fff7ed; color: #1c1917; }
      main { max-width: 28rem; padding: 2rem; text-align: center; }
      img { width: 6rem; height: 6rem; border-radius: 1.25rem; }
      button { border: 0; border-radius: .75rem; padding: .75rem 1rem; background: #f59e0b; color: #111827; font: inherit; font-weight: 700; cursor: pointer; }
      @media (prefers-color-scheme: dark) { body { background: #1c1917; color: #fafaf9; } }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192.png" alt="Klovers" />
      <h1>You’re offline</h1>
      <p>Reconnect to continue your Korean lessons and sync your progress.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>

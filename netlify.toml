# Netlify configuration for Klovers
[build]
  command = "npm run build"
  publish = "dist"
  functions = "supabase/functions"

[build.environment]
  NODE_VERSION = "18.17.0"
  NPM_VERSION = "9.8.1"

# Development settings
[dev]
  command = "npm run dev"
  port = 5173
  autoLaunch = false

# Note: Redirects and headers are configured in public/_redirects and public/_headers
